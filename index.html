<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gigi’s Pink Blog 💗</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">

  <style>
    body {
      background: #ffe6f0;
      font-family: 'Quicksand', sans-serif;
      margin: 0;
    }

    header {
      background: #ff99cc;
      padding: 20px;
      text-align: center;
      color: white;
      font-family: 'Pacifico', cursive;
      font-size: 2.5em;
    }

    .container {
      width: 80%;
      margin: 20px auto;
    }

    .post {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .post h2 {
      color: #ff66a3;
      font-family: 'Pacifico', cursive;
    }

    .post img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    .date {
      font-size: 0.8em;
      color: gray;
    }
  </style>
</head>

<body>

<header>
  💕 Gigi’s Life Blog 💕
</header>

<div class="container">

  <div class="post">
    <h2>My First Post 💗</h2>
    <div class="date">April 27, 2026</div>
    <p>This is my first blog post!! 💕</p>
  </div>

</div>

</body>
</html>
